<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEXORA | Clients</title>

    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn")!=="true"){
    window.location.href="../../login.html";
}

</script>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>NEXORA</h2>

        </div>

        <ul class="menu">

            <li id="dashboardBtn">

                <i class="ri-dashboard-line"></i>

                <span>Dashboard</span>

            </li>

            <li id="portfolioBtn">

                <i class="ri-briefcase-line"></i>

                <span>Portfolio</span>

            </li>

            <li id="servicesBtn">

                <i class="ri-service-line"></i>

                <span>Services</span>

            </li>

            <li id="messagesBtn">

                <i class="ri-message-3-line"></i>

                <span>Messages</span>

            </li>

            <li class="active">

                <i class="ri-group-line"></i>

                <span>Clients</span>

            </li>

            <li id="teamBtn">

                <i class="ri-team-line"></i>

                <span>Team</span>

            </li>

            <li id="settingsBtn">

                <i class="ri-settings-3-line"></i>

                <span>Settings</span>

            </li>

            <li id="logoutBtn">

                <i class="ri-logout-box-r-line"></i>

                <span>Logout</span>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Clients</h1>

                <p>Manage all clients.</p>

            </div>

            <button class="add-btn" id="addClientBtn">

                <i class="ri-add-line"></i>

                Add Client

            </button>

        </header>

        <!-- Search -->

        <section class="toolbar">

            <div class="search-box">

                <i class="ri-search-line"></i>

                <input
                    type="text"
                    id="searchClient"
                    placeholder="Search Client...">

            </div>

        </section>

        <!-- Table -->

        <section class="table-card">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Company</th>

                        <th>Service</th>

                        <th>Status</th>

                        <th>Date</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="clientTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- Modal -->

<div class="modal" id="clientModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Add Client</h2>

            <i class="ri-close-line" id="closeModal"></i>

        </div>

        <form id="clientForm">

            <div class="form-group">

                <label>Client Name</label>

                <input
                    type="text"
                    id="clientName"
                    required>

            </div>

            <div class="form-group">

                <label>Company</label>

                <input
                    type="text"
                    id="clientCompany">

            </div>

            <div class="form-group">

                <label>Service</label>

                <input
                    type="text"
                    id="clientService">

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="clientStatus">

                    <option>Active</option>
                    <option>Pending</option>
                    <option>Completed</option>

                </select>

            </div>

            <button type="submit">

                Save Client

            </button>

        </form>

    </div>

</div>

<script src="../../assets/js/clients.js"></script>

</body>

</html>
