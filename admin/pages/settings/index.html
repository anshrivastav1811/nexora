<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEXORA | Settings</title>

    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

<script>

if(localStorage.getItem("isLoggedIn")!=="true"){
    window.location.href="../../login.html";
}

</script>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>NEXORA</h2>

        </div>

        <ul class="menu">

            <li id="dashboardBtn">

                <i class="ri-dashboard-line"></i>

                <span>Dashboard</span>

            </li>

            <li id="portfolioBtn">

                <i class="ri-briefcase-line"></i>

                <span>Portfolio</span>

            </li>

            <li id="servicesBtn">

                <i class="ri-service-line"></i>

                <span>Services</span>

            </li>

            <li id="messagesBtn">

                <i class="ri-message-3-line"></i>

                <span>Messages</span>

            </li>

            <li id="clientsBtn">

                <i class="ri-group-line"></i>

                <span>Clients</span>

            </li>

            <li id="teamBtn">

                <i class="ri-team-line"></i>

                <span>Team</span>

            </li>

            <li class="active">

                <i class="ri-settings-3-line"></i>

                <span>Settings</span>

            </li>

            <li id="logoutBtn">

                <i class="ri-logout-box-r-line"></i>

                <span>Logout</span>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Settings</h1>

                <p>Manage your website settings.</p>

            </div>

        </header>

        <div class="table-card" style="padding:30px;">

            <form id="settingsForm">

                <div class="form-group">

                    <label>Website Name</label>

                    <input
                        type="text"
                        id="siteName"
                        placeholder="NEXORA">

                </div>

                <div class="form-group">

                    <label>Admin Email</label>

                    <input
                        type="email"
                        id="adminEmail"
                        placeholder="admin@nexora.com">

                </div>

                <div class="form-group">

                    <label>Contact Number</label>

                    <input
                        type="text"
                        id="contactNumber">

                </div>

                <div class="form-group">

                    <label>Website Description</label>

                    <textarea
                        id="siteDescription"></textarea>

                </div>

                <button type="submit">

                    Save Settings

                </button>

            </form>

        </div>

    </main>

</div>

<script src="../../assets/js/settings.js"></script>

</body>

</html>
